<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="icon" type="image/png" href="Enviable__1_-64x64.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviable</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #050505;
      color: #f5f5f5;
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(245,245,245,0.08);
      backdrop-filter: blur(12px);
      background: rgba(5,5,5,0.75);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.3em;
      cursor: pointer;
      text-decoration: none;
      color: #f5f5f5;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.35;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-links a.join {
      opacity: 0.8;
      border: 1px solid rgba(245,245,245,0.2);
      padding: 0.3rem 0.8rem;
    }
    .nav-links a.join:hover { opacity: 1; border-color: #f5f5f5; }

    .nav-join-mobile {
      display: none;
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid rgba(245,245,245,0.3);
      padding: 0.35rem 0.9rem;
    }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-join-mobile { display: block; }
    }

    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    .slider-section {
      padding-top: 70px;
      border-bottom: 1px solid rgba(245,245,245,0.06);
    }

    .slider-wrapper { position: relative; overflow: hidden; }

    .slider-track {
      display: flex;
      gap: 8px;
      padding: 0 8px;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .slide-card {
      min-width: calc((100vw - 5 * 8px - 8px) / 5);
      height: 80px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245,245,245,0.06);
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
      overflow: hidden;
    }

    .slide-card:hover { background: #151515; border-color: rgba(245,245,245,0.14); }

    .slide-text {
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.18;
    }

    .slide-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }

    .slider-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: #050505;
      border-top: 1px solid rgba(245,245,245,0.05);
    }

    .ctrl-left { display: flex; align-items: center; gap: 0.8rem; }

    .slider-btn {
      background: none;
      border: 1px solid rgba(245,245,245,0.12);
      color: #f5f5f5;
      width: 26px; height: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.7rem;
    }
    .slider-btn:hover { border-color: rgba(245,245,245,0.4); background: rgba(245,245,245,0.04); }

    .slider-progress { font-size: 0.45rem; letter-spacing: 0.15em; opacity: 0.2; }

    .slider-dots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 50%; }
    .dot {
      width: 12px; height: 1px;
      background: rgba(245,245,245,0.2);
      transition: background 0.3s, width 0.3s;
      cursor: pointer;
    }
    .dot.active { background: #f5f5f5; width: 20px; }

    .hero {
      height: calc(100vh - 150px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 20vw, 18rem);
      color: #f5f5f5;
      letter-spacing: 0.05em;
      animation: fadeIn 1.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #page-about { padding-top: 70px; }

    .about-inner {
      min-height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .about-label {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.2;
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .about-label::before {
      content: '';
      display: inline-block;
      width: 30px;
      height: 1px;
      background: currentColor;
    }

    .about-text {
      font-size: 0.85rem;
      line-height: 2.2;
      letter-spacing: 0.08em;
      opacity: 0.3;
    }

    .about-text span {
      opacity: 1;
      color: #f5f5f5;
    }

    footer {
      border-top: 1px solid rgba(245,245,245,0.06);
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.15;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" onclick="showPage('home')">Enviable</a>
    <ul class="nav-links">
      <li><a onclick="showPage('about')">About Us</a></li>
      <li><a href="https://discord.gg/EPTUcyAwDW" target="_blank" class="join">Join</a></li>
    </ul>
    <a href="https://discord.gg/EPTUcyAwDW" target="_blank" class="nav-join-mobile">Join</a>
  </nav>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="slider-section">
      <div class="slider-wrapper">
        <div class="slider-track" id="sliderTrack"></div>
      </div>
      <div class="slider-controls">
        <div class="ctrl-left">
          <button class="slider-btn" id="prevBtn">&#8592;</button>
          <button class="slider-btn" id="nextBtn">&#8594;</button>
          <span class="slider-progress" id="progressText">01 / 25</span>
        </div>
        <div class="slider-dots" id="dotsContainer"></div>
      </div>
    </div>
    <div class="hero">
      <h1>ENVIABLE</h1>
    </div>
    <footer>
      <span>© 2025 Enviable</span>
      <span>German Gaming Community</span>
    </footer>
  </div>

  <!-- ABOUT -->
  <div class="page" id="page-about">
    <div class="about-inner">
      <p class="about-label">About Us</p>
      <p class="about-text">
  We're <span>chronically online</span> and care about <span>games</span>, <span>money</span> and <span>memes</span>.
</p>
    </div>
    <footer>
      <span>© 2025 Enviable</span>
      <span>German Gaming Community</span>
    </footer>
  </div>

  <script>
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      window.scrollTo(0, 0);
    }

    const track = document.getElementById('sliderTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressText = document.getElementById('progressText');
    const dotsContainer = document.getElementById('dotsContainer');

    const TOTAL = 25;
    const GAP = 8;
    let current = 0;

    for (let i = 1; i <= TOTAL; i++) {
      const card = document.createElement('div');
      card.className = 'slide-card';
      if (i === 22) {
        card.innerHTML = `<img src="download.jfif" alt="Member 22">`;
      } else {
        card.innerHTML = `<span class="slide-text">Blueiron</span>`;
      }
      track.appendChild(card);
    }

    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    }

    function getCardWidth() {
      const card = track.querySelector('.slide-card');
      return card ? card.offsetWidth + GAP : 0;
    }

    function goTo(index) {
      if (index >= TOTAL) index = 0;
      if (index < 0) index = TOTAL - 1;
      current = index;
      track.style.transform = `translateX(-${current * getCardWidth()}px)`;
      progressText.textContent = `${String(current + 1).padStart(2,'0')} / ${TOTAL}`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft') goTo(current - 1);
    });
  </script>

</body>
</html>
